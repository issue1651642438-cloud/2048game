<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 - 注册登录版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================
       认证区域
       ============================ -->
  <div id="auth-section">
    <div class="auth-card">
      <h1 class="auth-title">2048小游戏</h1>
      <p class="auth-subtitle">登录后可保存你的最高分</p>

      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">登录</button>
        <button class="tab-btn" data-tab="register">注册</button>
      </div>

      <!-- 登录 -->
      <form id="login-form" class="auth-form active">
        <input type="email"     id="login-email"    placeholder="邮箱地址"                required>
        <input type="password"  id="login-password" placeholder="密码"                    required>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="auth-btn">登录</button>
      </form>

      <!-- 注册 -->
      <form id="register-form" class="auth-form">
        <input type="email"     id="register-email"    placeholder="邮箱地址"              required>
        <input type="password"  id="register-password" placeholder="密码（至少 6 位）"     required minlength="6">
        <div id="register-error" class="error-msg"></div>
        <button type="submit" class="auth-btn">注册</button>
      </form>

      <div class="divider"><span>或</span></div>
      <button id="guest-btn" class="guest-btn">🎮 访客模式</button>

      <div class="auth-credit">——by issue</div>
    </div>
  </div>

  <!-- ============================
       游戏区域
       ============================ -->
  <div id="game-section" class="hidden">
    <div class="container">
      <div class="heading">
        <h1 class="title">2048</h1>
        <div class="scores-container">
          <div class="score-box">
            <div class="score-label">分数</div>
            <div id="score" class="score-value">0</div>
          </div>
          <div class="score-box">
            <div class="score-label">最高</div>
            <div id="best-score" class="score-value">0</div>
          </div>
        </div>
      </div>

      <div class="subheading">
        <div id="user-info"></div>
        <div class="controls">
          <button id="new-game-btn"  class="game-btn">新游戏</button>
          <button id="logout-btn"    class="game-btn logout-btn">退出</button>
        </div>
      </div>

      <div id="game-container" class="game-container">
        <div id="grid-background" class="grid-background"></div>
        <div id="tile-container" class="tile-container"></div>

        <div id="game-over-overlay" class="game-over-overlay hidden">
          <div class="game-over-content">
            <h2>游戏结束！</h2>
            <p id="final-score">得分：0</p>
            <button id="restart-btn" class="game-btn large">再来一局</button>
          </div>
        </div>

        <div id="win-overlay" class="game-over-overlay hidden">
          <div class="game-over-content">
            <h2>🎉 你赢了！</h2>
            <button id="continue-btn" class="game-btn large">继续挑战</button>
          </div>
        </div>
      </div>

      <p class="game-instructions">方向键 ← ↑ → ↓ 或滑动控制方块移动</p>

      <div class="bottom-bar">
        <button id="music-btn" class="game-btn bottom-btn music-on" title="背景音乐">🔊 背景音乐</button>
        <button id="share-btn" class="game-btn bottom-btn share-btn" title="分享">📋 分享</button>
      </div>

      <div class="game-footer">
        <p class="footer-line">— Created by <strong>issue</strong> &amp; <strong>Claude Code</strong> —</p>
        <p class="footer-line">
          仓库位置
          <a href="https://github.com/issue1651642438-cloud/2048game" target="_blank" title="求求你了，我真的很需要star QAQ" class="footer-link">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </p>
        <p class="footer-line">— 欢迎 Star！ —</p>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast hidden"></div>

  <!-- Firebase SDK (Compat 模式) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
